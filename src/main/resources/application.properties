spring.application.name=voiceshield-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:voiceshield}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:voiceshield}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:voiceshield}}
spring.datasource.driver-class-name=org.postgresql.Driver

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
kakao.oauth.client-id=${KAKAO_REST_API_KEY:}
kakao.oauth.redirect-uri=${KAKAO_REDIRECT_URI:}
kakao.oauth.client-secret=${KAKAO_CLIENT_SECRET:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:Content-Type,X-User-Id}
